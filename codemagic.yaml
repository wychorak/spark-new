workflows:
  ios-testflight:
    name: Spark iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 22.14.0
      xcode: latest
      cocoapods: default
      groups:
        - spark keys
      vars:
        BUNDLE_ID: "com.sparknew.connect"
        APP_STORE_APP_ID: "6785284685"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sparknew.connect

    integrations:
      app_store_connect: wychor appstoreconnectkey

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Validate release configuration
        script: |
          npm run release:check

      - name: Set iOS build number
        script: |
          LATEST_BUILD_NUMBER="$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || printf '0')"
          case "$LATEST_BUILD_NUMBER" in
            ''|*[!0-9]*) LATEST_BUILD_NUMBER=0 ;;
          esac
          NEXT_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          CM_NUMBER="${CM_BUILD_NUMBER:-0}"
          if [ "$CM_NUMBER" -gt "$NEXT_BUILD_NUMBER" ]; then
            NEXT_BUILD_NUMBER="$CM_NUMBER"
          fi
          node -e "const fs=require('fs'); const app=JSON.parse(fs.readFileSync('app.json','utf8')); app.expo.ios=app.expo.ios||{}; app.expo.ios.buildNumber=process.argv[1]; fs.writeFileSync('app.json', JSON.stringify(app,null,2)+'\n'); console.log('Using iOS build number', process.argv[1]);" "$NEXT_BUILD_NUMBER"

      - name: Generate iOS project from Expo
        script: |
          npx expo prebuild --platform ios --clean --non-interactive


      - name: Validate generated Podfile
        script: |
          node -e "const fs=require('fs'); const podfile=fs.readFileSync('ios/Podfile','utf8'); if (!podfile.includes('use_modular_headers!')) throw new Error('Missing modular headers in generated ios/Podfile');"

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Configure code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Spark.xcworkspace \
            --scheme Spark

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - wychor234@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
