<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .glass-overlay {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pink-glow {
            box-shadow: 0 0 30px rgba(255, 76, 131, 0.3);
        }
        .pink-glow-lg {
            box-shadow: 0 0 50px rgba(255, 76, 131, 0.5);
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative antialiased selection:bg-primary-container selection:text-white">
<!-- Canvas (Main Content) -->
<main class="flex-grow flex flex-col items-center justify-start w-full max-w-[1200px] mx-auto overflow-hidden relative">
<!-- Background Decorative Element -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary-container/30 via-background to-background"></div>
<!-- Scrollable Content Area (Simulating Modal overlay) -->
<div class="w-full md:max-w-md h-full min-h-screen z-10 flex flex-col relative pb-[120px]">
<!-- Modal Close / Back (Simulated for intent) -->
<div class="absolute top-6 left-4 z-20">
<button class="w-12 h-12 rounded-full glass-overlay flex items-center justify-center text-white hover:bg-white/10 transition-colors active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
</div>
<!-- Profile Hero Image & Info Card -->
<div class="relative w-full aspect-[4/5] rounded-b-3xl overflow-hidden shrink-0">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A highly detailed portrait of an attractive young woman with a stylish, modern look. She has a confident, warm expression. The lighting is soft and cinematic with a vibrant neon pink rim light suggesting a nightlife or high-end bar setting. The background is a deeply blurred, dark atmosphere with subtle bokeh." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCIJCf_4x1riGvulnlOY3WMAi074vN-JXT8WTI-vqMfPZeA39Ls9Y98QONa_e7a-7IKiNwnVEhIPcQ52HOkM9yKyDH8dTD3cVxM3nKx0_09dpYClGGFpvtBSFfnQwq7RjXIm8OUqCvJHD6_eaDeAf_fbwD4syISSTE19WsOTgeOryR4_jZCH5I2pqZ7GPXomJd_naxqBP_ROwGtX_I0qcTmvVae1li3-vlUU11LKMpiRN-NRv0phORXMg')"></div>
<!-- Bottom Gradient Overlay for Text Readability -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent"></div>
<!-- Profile Info Layered over Image -->
<div class="absolute bottom-0 left-0 w-full p-margin-mobile flex flex-col gap-sm z-10">
<!-- Pro Badge & Match -->
<div class="flex items-center gap-2 mb-xs">
<div class="glass-overlay rounded-full px-3 py-1 flex items-center gap-1 bg-surface-container-low/80 backdrop-blur-md">
<span class="text-primary-container text-label-bold font-label-bold">PRO</span>
</div>
<div class="glass-overlay rounded-full px-3 py-1 flex items-center gap-1">
<span class="text-primary text-label-bold font-label-bold">99% Match</span>
</div>
</div>
<!-- Name & Age -->
<h1 class="text-display font-display text-white drop-shadow-lg">Aisha Nowak, 24</h1>
<!-- Distance & Basics -->
<div class="flex flex-wrap gap-2 text-sm text-on-surface-variant font-body-md">
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">location_on</span> 2 km</span>
<span>•</span>
<span>Wiek pasuje</span>
</div>
<!-- Tags / Interests -->
<div class="flex flex-wrap gap-2 mt-2">
<div class="bg-surface-container-high/80 backdrop-blur-md border border-white/10 text-on-surface rounded-full px-4 py-1.5 text-label-bold font-label-bold shadow-sm">2 km</div>
<div class="bg-[#3D2C20]/80 backdrop-blur-md border border-[#D5A77A]/30 text-[#D5A77A] rounded-full px-4 py-1.5 text-label-bold font-label-bold">Kawa</div>
<div class="bg-[#3A2D1B]/80 backdrop-blur-md border border-[#D8A752]/30 text-[#D8A752] rounded-full px-4 py-1.5 text-label-bold font-label-bold">Sztuka</div>
<div class="bg-primary/20 backdrop-blur-md border border-primary/30 text-primary-fixed-dim rounded-full px-4 py-1.5 text-label-bold font-label-bold">Filmy</div>
</div>
</div>
</div>
<!-- Scrollable Details Content -->
<div class="px-margin-mobile py-lg flex flex-col gap-lg z-10">
<!-- Bio -->
<div class="space-y-xs">
<p class="text-body-lg font-body-lg text-on-surface leading-relaxed">
                        Projektantka, łowczyni ukrytych kawiarni i galerii. Szuka kogoś do rozmów bez pośpiechu.
                    </p>
</div>
<!-- Integrations (Instagram, Spotify) -->
<div class="flex flex-wrap gap-sm">
<button class="glass-overlay rounded-full px-4 py-2 flex items-center gap-2 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="text-label-bold font-label-bold text-white">@aisha.design</span>
</button>
<button class="glass-overlay rounded-full px-4 py-2 flex items-center gap-2 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[#1DB954]" style="font-variation-settings: 'FILL' 1;">headphones</span>
<span class="text-label-bold font-label-bold text-white">Indie evenings</span>
</button>
</div>
<!-- Info Banner -->
<div class="glass-overlay rounded-xl p-4 flex gap-3 items-start mt-4 bg-surface-container-low border-primary/20">
<span class="material-symbols-outlined text-primary mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-label-bold font-label-bold text-on-surface-variant text-sm">
                        Free: lajki i chat po matchu. Pro odblokowuje Superlike, prośby o chat i filtry premium.
                    </p>
</div>
<!-- Secondary Actions (Report / Block) -->
<div class="flex gap-4 mt-6">
<button class="flex-1 glass-overlay rounded-xl py-3 flex items-center justify-center gap-2 text-primary-fixed-dim hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[20px]">flag</span>
<span class="text-label-bold font-label-bold">Zgłoś</span>
</button>
<button class="flex-1 glass-overlay rounded-xl py-3 flex items-center justify-center gap-2 text-primary-fixed-dim hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[20px]">block</span>
<span class="text-label-bold font-label-bold">Blokuj</span>
</button>
</div>
</div>
</div>
<!-- Sticky Bottom Action Bar (Contextual FAB Replacement for Details Screen) -->
<div class="fixed bottom-0 w-full md:max-w-md mx-auto z-40 pb-safe bg-gradient-to-t from-background via-background/90 to-transparent pt-12 px-margin-mobile pb-6 flex items-center justify-center gap-6">
<!-- Dislike / Close -->
<button class="w-16 h-16 rounded-full glass-overlay flex items-center justify-center text-on-surface hover:bg-white/10 transition-transform active:scale-90 shadow-lg border border-white/5 bg-surface-container-low">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<!-- Main Like / Match Button -->
<button class="w-24 h-24 rounded-full bg-primary-container text-white flex items-center justify-center pink-glow-lg transition-transform active:scale-95 hover:bg-[#ff3370]">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
<!-- Super Like / Premium Action -->
<button class="w-16 h-16 rounded-full glass-overlay flex items-center justify-center text-primary hover:bg-white/10 transition-transform active:scale-90 shadow-lg border border-white/5 relative bg-surface-container-low">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">star</span>
<div class="absolute -top-1 -right-1 bg-primary text-background rounded-full w-5 h-5 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</button>
</div>
</main>
<!-- Navigation Shell suppressed because this is a contextual profile preview modal/overlay -->
</body></html>
