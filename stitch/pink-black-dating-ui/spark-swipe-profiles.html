<!DOCTYPE html><html class="dark" lang="pl" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

                        "on-tertiary-container": "#2a2a2a",

                        "on-primary-fixed-variant": "#90003d",
                        "outline": "#ab888e",
                        "surface-dim": "#131313",
                        "inverse-primary": "#bc0051",
                        "surface-variant": "#353535",
                        "on-secondary-fixed-variant": "#454747",

<style>
        body {
            overscroll-behavior-y: none;
        }
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pink-glow {
            box-shadow: 0 0 30px rgba(255, 76, 131, 0.4);
        }
    </style>
</head>
<body class="bg-background text-on-surface h-screen w-screen overflow-hidden font-body-md flex flex-col items-center">
<!-- Top App Bar -->
<header class="w-full max-w-[500px] flex justify-between items-center px-margin-mobile py-sm z-50 bg-background dark:bg-background">
<div class="flex flex-col">
<span class="text-primary-container font-label-bold text-label-bold uppercase tracking-wider text-[10px]">Odkrywaj</span>
<div class="flex items-center gap-2">
<span class="text-headline-lg-mobile font-display font-black text-on-surface dark:text-on-surface">Spark</span>
</div>
</div>
<button class="glass-panel flex items-center gap-xs px-3 py-1.5 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary-container text-[18px]">location_on</span>
<span class="font-label-bold text-label-bold text-on-surface">2 km</span>
</button>
</header>
<!-- Plan Toggle -->
<div class="w-full max-w-[500px] px-margin-mobile mb-md z-40">
<div class="glass-panel rounded-full p-1 flex relative">
<button class="flex-1 py-2 rounded-full bg-primary-container text-white font-label-bold text-label-bold text-center z-10">Free</button>
<button class="flex-1 py-2 rounded-full text-on-surface-variant font-label-bold text-label-bold text-center flex justify-center items-center gap-1 z-10 hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[16px]">lock</span> Pro
            </button>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[500px] px-margin-mobile relative pb-24 flex flex-col justify-end">
<!-- Profile Card -->
<div class="relative w-full h-[65vh] rounded-xl overflow-hidden shadow-2xl bg-surface-container border border-white/5">
<!-- Background Image -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="A portrait of a beautiful 24-year-old Polish woman named Aisha, short dark hair, styled in a trendy urban outfit, sitting in a softly lit indie coffee shop. The lighting is warm and moody, focusing on her expressive face. High-quality photography, nightlife dating app aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB89o5sB-GIoUny79XDVLkmTngZeDNxRiUC8ZflWZztoupgBKnJCJPmb-GMMYZS9eEHJAhIbashEFOnkSnbLfNsZ_vzeBXG71SwCIljSQkSLxls_dctMMT-RKsgr1e1oq8wIpUN8xmtSuIBYig--vM1Uj3BWvP65ops4GMM5RumkjZj03d1tX349eZ0M8EkINdDEbYUP4XrYycOwsI2HQs9mHYeu3cplEyqtzUdpBY1erFc9CWPrDv2PA')"></div>
<!-- Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
<!-- Chips Container (Top) -->
<div class="absolute top-md left-md right-md flex flex-wrap gap-2 z-20">
<div class="glass-panel px-3 py-1 rounded-full text-white font-label-sm text-label-sm">2 km</div>
<div class="bg-[#F3E5D8]/90 text-[#8B5E34] px-3 py-1 rounded-full font-label-bold text-label-bold">Kawa</div>
<div class="bg-[#F3E5D8]/90 text-[#8B5E34] px-3 py-1 rounded-full font-label-bold text-label-bold">Sztuka</div>
<div class="bg-[#F8D7E8]/90 text-[#D84A8A] px-3 py-1 rounded-full font-label-bold text-label-bold">Filmy</div>
</div>
<!-- Pro Spark Badge Overlay (Mimicking the visual) -->
<div class="absolute top-1/3 left-md z-20 pointer-events-none">
<img alt="Spark Pro Visual Overlay" class="w-32 h-auto opacity-80 mix-blend-screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcnwjtqgvgOZ1KqzAQlYNBpahiO6yLXcSjhPPX8EPDF67rQICiB1PPlbVCkcmUvpqH1Cp1GNe6Ua-hsaVa6nhGHdzwK7hMblVY8D_7Jsc_4ONNVDq2lfxYOxou3Y_Xr4jaNXEcTSprEX-wML5cfzocasxRwVWlnGYPshXc0nGPjfsrcTYtm3uy8MTFuX2xoS54doDOU46mCcBggUkzMqwK_6oqO6FdRkUjplf1vIDBF_jT7_pVPqJJZ6W79LqO57zjaew">
</div>
<!-- Match Info Box -->
<div class="absolute bottom-[160px] left-md z-20 glass-panel px-4 py-2 rounded-lg">
<div class="text-primary-container font-label-bold text-label-bold">99% match</div>
<div class="text-on-surface-variant text-[10px] leading-tight mt-0.5">2 km • wiek pasuje • Kawa + Sztuka • boost Pro</div>
</div>
<!-- Profile Info (Bottom) -->
<div class="absolute bottom-md left-md right-md z-20">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-white mb-xs drop-shadow-md">Aisha Nowak, 24</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-4 line-clamp-2 drop-shadow">Projektantka, łowczyni ukrytych kawiarni i galerii. Szuka kogoś do rozmów bez pośpiechu.</p>
<div class="flex gap-2">
<button class="glass-panel flex items-center gap-1 px-3 py-1.5 rounded-full text-white hover:bg-white/20 transition">
<span class="material-symbols-outlined text-[16px]">alternate_email</span>
<span class="font-label-sm text-label-sm">@aisha.design</span>
</button>
<button class="glass-panel flex items-center gap-1 px-3 py-1.5 rounded-full text-white hover:bg-white/20 transition">
<span class="material-symbols-outlined text-[16px]">music_note</span>
<span class="font-label-sm text-label-sm">Indie evenings</span>
</button>
</div>
</div>
</div>
</main>
<!-- Floating Action Buttons (FABs) -->
<div class="fixed bottom-6 w-full max-w-[500px] px-margin-mobile flex justify-center gap-4 z-50 items-end">
<!-- Odrzuć (Reject) -->
<button class="flex flex-col items-center gap-1 hover:scale-110 transition-transform active:scale-95">
  <div class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-on-surface shadow-lg">
    <span class="material-symbols-outlined text-[28px]">close</span>
  </div>
  <span class="text-on-surface font-label-sm text-[10px] uppercase tracking-wider">Odrzuć</span>
</button>
<!-- Obejrzyj profil -->
<button class="flex flex-col items-center gap-1 hover:scale-110 transition-transform active:scale-95">
  <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-on-surface shadow-lg">
    <span class="material-symbols-outlined text-[24px]">person</span>
  </div>
  <span class="text-on-surface font-label-sm text-[10px] uppercase tracking-wider">Zobacz profil</span>
</button>
<!-- Matchuj (Like) -->
<button class="flex flex-col items-center gap-1 hover:scale-110 transition-transform active:scale-95 mx-2">
  <div class="w-20 h-20 rounded-full bg-primary-container text-white flex items-center justify-center pink-glow relative">
    <span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
    <div class="absolute -top-1 -right-1 w-5 h-5 bg-surface-container-highest rounded-full flex items-center justify-center border-2 border-background">
      <span class="material-symbols-outlined text-[10px] text-white" style="font-variation-settings: 'FILL' 1;">lock</span>
    </div>
  </div>
  <span class="text-primary-container font-label-bold text-[10px] uppercase tracking-widest">SPARKLIKE</span>
</button>
<!-- Superlike -->
<button class="flex flex-col items-center gap-1 hover:scale-110 transition-transform active:scale-95">
  <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-on-surface shadow-lg">
    <span class="material-symbols-outlined text-[24px]">chat</span>
  </div>
  <span class="text-on-surface font-label-sm text-[10px] uppercase tracking-wider">Napisz teraz</span>
</button>
<!-- Napisz teraz (Pro) -->
<button class="flex flex-col items-center gap-1 hover:scale-110 transition-transform active:scale-95">
  <div class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-on-surface shadow-lg">
    <span class="material-symbols-outlined text-[28px]">favorite</span>
  </div>
  <span class="text-on-surface font-label-sm text-[10px] uppercase tracking-wider">Match</span>
</button>
</div>


</body></html>
