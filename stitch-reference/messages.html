<style>

            color: theme('colors.on-background');
            font-family: 'Inter', sans-serif;

        }
        
        /* Subtle Cherry Blossom decorative background */
        .cherry-blossom-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            background-image: radial-gradient(circle at 100% 0%, rgba(254, 182, 196, 0.15) 0%, transparent 40%),

        }

        .glass-panel {
            background: transparent;
        }

        .chat-list-item {
            transition: background-color 0.2s ease;
        }
        .chat-list-item:active {
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;

            scrollbar-width: none;
